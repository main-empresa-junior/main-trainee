{% extends "base.html" %}

{% block title %}Parceiros{% endblock title %}

{% block content %}
<h1 class="title">
  {{ section.title }}
</h1>
<ul>
  <!-- If you are using pagination, section.pages will be empty.
       You need to use the paginator object -->  
  {% for page in section.pages %}
  <li><a href="{{ page.permalink | safe }}">{{ page.title }}</a></li>
  {% endfor %}
</ul>
  <div id="estrelaFundo"><img src="/imagens/metal-neon.svg" alt="estrelaFundo"></div>
  <div id="AnelNeon"><img src="/imagens/AnelNeon.png" alt=""></div>
  <div id="noteRoxo"><img src="/imagens/noteRoxo.png" alt="noteRoxo"></div>
  <div id="blur-aura"></div>  
  <div id="blur-aura-rosa"></div> 
  <div id="cuboNeon"><img src="/imagens/cube-Transparent.svg" alt=""></div>
<section class="content-container">
    <div class="texto">
        {{ section.content | safe }}
    </div>
</section>
{% endblock content %}
